name: backend-spring-tests

on:
  pull_request:
    branches: [ dev ]
  push:
    branches: [ dev ]
  workflow_dispatch:

concurrency:
  group: backend-spring-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend-spring:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend-spring
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Grant execute permission for Maven Wrapper
        run: chmod +x mvnw

      - name: Run tests (Maven Wrapper)
        run: ./mvnw test
