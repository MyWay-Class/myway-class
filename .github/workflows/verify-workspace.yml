name: verify-workspace

on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ main, dev ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-workspace-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect workspace layout
        id: detect
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.detect.outputs.run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Set up Java 21
        if: steps.detect.outputs.run == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install dependencies
        if: steps.detect.outputs.run == 'true'
        run: npm ci

      - name: Patch rollup optional dependency on Linux
        if: steps.detect.outputs.run == 'true' && runner.os == 'Linux'
        run: npm install --no-save @rollup/rollup-linux-x64-gnu

      - name: Verify workspace
        if: steps.detect.outputs.run == 'true'
        run: npm run verify
