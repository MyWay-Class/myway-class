name: orchestration-gate

on:
  pull_request:
    branches: [ dev, main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Run orchestrator gate
        run: npm run orch:run
        env:
          ORCH_PROFILE: strict

      - name: Ensure decision artifact exists
        run: test -f _workspace/decision.json

      - name: Enforce approved state
        run: |
          node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync('_workspace/decision.json','utf8'));if(d.state!=='approved'){console.error('state is not approved:',d.state);process.exit(1);}"

      - name: Comment PR with gate result
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const d = fs.existsSync('_workspace/decision.json')
              ? JSON.parse(fs.readFileSync('_workspace/decision.json','utf8'))
              : { traceId: 'n/a', taskId: 'n/a', state: 'unknown', decision: 'unknown', reason: 'decision artifact missing', requestChangeCodes: [], nextActions: [] };
            const s = fs.existsSync('_workspace/scorecard.json')
              ? JSON.parse(fs.readFileSync('_workspace/scorecard.json','utf8'))
              : null;
            const r = fs.existsSync('_workspace/remediation.json')
              ? JSON.parse(fs.readFileSync('_workspace/remediation.json','utf8'))
              : null;
            const codes = Array.isArray(d.requestChangeCodes) && d.requestChangeCodes.length > 0
              ? d.requestChangeCodes.join(', ')
              : 'none';
            const nextActions = Array.isArray(d.nextActions) && d.nextActions.length > 0
              ? d.nextActions.join(' | ')
              : 'n/a';
            const topActions = r && Array.isArray(r.actions)
              ? r.actions.slice(0, 3).map((a) => `[${a.code}] ${a.action} (${a.owner})`).join(' | ')
              : 'n/a';
            const body = [
              '### Orchestration Gate Result',
              `- trace id: ${d.traceId || 'n/a'}`,
              `- task id: ${d.taskId || 'n/a'}`,
              `- state: ${d.state}`,
              `- decision: ${d.decision}`,
              `- reason: ${d.reason}`,
              s ? `- total score: ${s.total}` : '- total score: n/a',
              s ? `- required failed: ${(Array.isArray(s.required_failed) && s.required_failed.length > 0) ? s.required_failed.join(', ') : 'none'}` : '- required failed: n/a',
              s ? `- fail-fast triggered: ${Boolean(s.fail_fast_triggered)}` : '- fail-fast triggered: n/a',
              `- request change codes: ${codes}`,
              `- next actions: ${nextActions}`,
              `- remediation (top 3): ${topActions}`
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const marker = '### Orchestration Gate Result';
            const previous = comments
              .filter((c) => c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.startsWith(marker))
              .slice(-1)[0];
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Notify Slack on gate failure
        if: failure()
        uses: actions/github-script@v7
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          script: |
            if (!process.env.SLACK_WEBHOOK_URL) return;
            const fs = require('fs');
            const d = fs.existsSync('_workspace/decision.json')
              ? JSON.parse(fs.readFileSync('_workspace/decision.json','utf8'))
              : { traceId: 'n/a', taskId: 'n/a', state: 'unknown', decision: 'unknown', reason: 'decision artifact missing', requestChangeCodes: [] };
            const codeText = Array.isArray(d.requestChangeCodes) && d.requestChangeCodes.length > 0
              ? d.requestChangeCodes.join(', ')
              : 'none';
            const pr = context.payload.pull_request;
            const target = pr ? `PR #${pr.number}` : context.ref;
            const text = [
              ':rotating_light: orchestration-gate failed',
              `repo: ${context.repo.owner}/${context.repo.repo}`,
              `target: ${target}`,
              `trace: ${d.traceId || 'n/a'}`,
              `task: ${d.taskId || 'n/a'}`,
              `state: ${d.state || 'n/a'} / decision: ${d.decision || 'n/a'}`,
              `reason: ${d.reason || 'n/a'}`,
              `codes: ${codeText}`,
              `run: ${process.env.GITHUB_SERVER_URL}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`
            ].join('\n');
            await fetch(process.env.SLACK_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ text })
            });

      - name: Auto-approve PR when gate approved
        if: github.event_name == 'pull_request' && github.base_ref == 'dev'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('_workspace/decision.json','utf8'));
            if (d.state !== 'approved') return;
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: 'Automated orchestration gate approved.'
            });
