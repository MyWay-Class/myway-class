name: smoke-media-ai-shortform

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Backend base URL (e.g. https://api.example.com)"
        required: true
        type: string
      lecture_id:
        description: "Smoke lecture id"
        required: false
        default: "lec_java_01"
        type: string
      course_id:
        description: "Smoke course id"
        required: false
        default: "crs_java_01"
        type: string
      student_user_id:
        description: "Student user id for login"
        required: false
        default: "usr_std_001"
        type: string
      admin_user_id:
        description: "Admin user id for login"
        required: false
        default: "usr_admin_001"
        type: string

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run media-ai-shortform smoke
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url }}
          SMOKE_SHORTFORM_CALLBACK_TOKEN: ${{ secrets.SMOKE_SHORTFORM_CALLBACK_TOKEN }}
          SMOKE_LECTURE_ID: ${{ inputs.lecture_id }}
          SMOKE_COURSE_ID: ${{ inputs.course_id }}
          SMOKE_STUDENT_USER_ID: ${{ inputs.student_user_id }}
          SMOKE_ADMIN_USER_ID: ${{ inputs.admin_user_id }}
        run: npm run smoke:media-ai-shortform
