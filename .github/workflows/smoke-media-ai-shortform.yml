name: smoke-media-ai-shortform

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Backend base URL (e.g. https://api.example.com)"
        required: true
        type: string
      lecture_id:
        description: "Smoke lecture id"
        required: false
        type: string
      course_id:
        description: "Smoke course id"
        required: false
        type: string
      student_user_id:
        description: "Student user id for login"
        required: false
        default: "usr_std_001"
        type: string
      admin_user_id:
        description: "Admin user id for login"
        required: false
        default: "usr_admin_001"
        type: string
      require_playback:
        description: "Require strict playback probe (200/206 expected)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: smoke-media-ai-shortform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate smoke base URL
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url || vars.SMOKE_BASE_URL }}
        run: |
          if [ -z "$SMOKE_BASE_URL" ]; then
            echo "SMOKE_BASE_URL is required. Set workflow input (manual) or repository variable SMOKE_BASE_URL (schedule)." >&2
            exit 1
          fi

      - name: Validate smoke callback token
        env:
          SMOKE_SHORTFORM_CALLBACK_TOKEN: ${{ secrets.SMOKE_SHORTFORM_CALLBACK_TOKEN }}
        run: |
          if [ -z "$SMOKE_SHORTFORM_CALLBACK_TOKEN" ]; then
            echo "SMOKE_SHORTFORM_CALLBACK_TOKEN is required. Set the repository secret before running this smoke workflow." >&2
            exit 1
          fi

      - name: Run media-ai-shortform smoke
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url || vars.SMOKE_BASE_URL }}
          SMOKE_SHORTFORM_CALLBACK_TOKEN: ${{ secrets.SMOKE_SHORTFORM_CALLBACK_TOKEN }}
          SMOKE_LECTURE_ID: ${{ inputs.lecture_id }}
          SMOKE_COURSE_ID: ${{ inputs.course_id }}
          SMOKE_STUDENT_USER_ID: ${{ inputs.student_user_id || vars.SMOKE_STUDENT_USER_ID || 'usr_std_001' }}
          SMOKE_ADMIN_USER_ID: ${{ inputs.admin_user_id || vars.SMOKE_ADMIN_USER_ID || 'usr_admin_001' }}
          SMOKE_REQUIRE_PLAYBACK: ${{ inputs.require_playback || vars.SMOKE_REQUIRE_PLAYBACK || (github.event_name == 'schedule' && 'true') || 'false' }}
        run: npm run smoke:media-ai-shortform
