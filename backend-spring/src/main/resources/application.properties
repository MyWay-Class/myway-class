server.port=8787
spring.datasource.url=${MYWAY_DB_URL:jdbc:h2:file:./data/myway-feature-store;MODE=PostgreSQL;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE}
spring.datasource.username=${MYWAY_DB_USERNAME:sa}
spring.datasource.password=${MYWAY_DB_PASSWORD:}
spring.sql.init.mode=always
spring.h2.console.enabled=true
myway.shortform.retry.max-attempts=3
myway.shortform.callback.token=dev-shortform-callback-token
myway.media.callback.token=dev-media-callback-token
myway.media.callback.secret=dev-media-callback-token
myway.media.processor.url=
myway.media.processor.token=
myway.media.public-base-url=http://127.0.0.1:8787
myway.media.asset-proxy.base-url=
myway.media.asset-proxy.token=
myway.app.env=development
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
myway.ai.ollama.base-url=http://127.0.0.1:11434
myway.ai.gemini.base-url=https://generativelanguage.googleapis.com
myway.ai.gemini.api-key=${MYWAY_AI_GEMINI_API_KEY:}
myway.ai.timeout-ms=10000
myway.ai.retry-count=1
